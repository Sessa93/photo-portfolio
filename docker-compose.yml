services:
  webapp:
    image: ghcr.io/sessa93/photo-portfolio:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/photo_portfolio
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is not set — see .env.example}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is not set — see .env.example}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      INSTAGRAM_URL: ${INSTAGRAM_URL:-https://www.instagram.com/andreasessa1}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-andre9308@hotmail.it}

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: photo_portfolio
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: {}
