services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/photo_portfolio
      SESSION_SECRET: your_session_secret_here_000000000000000000000000000000000000
      OPENAI_API_KEY: your_openai_api_key_here
      OPENAI_MODEL: gpt-4o
      INSTAGRAM_URL: https://www.instagram.com/insta-id/
      CONTACT_EMAIL: your-mail-here

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: photo_portfolio
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: {}
